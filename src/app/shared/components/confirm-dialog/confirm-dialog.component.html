<div class="dialog-backdrop" (click)="onBackdropClick($event)">
  <div class="dialog-panel" role="dialog" aria-modal="true">
    <div class="dialog-icon-wrap" [class]="'icon-' + (config().type ?? 'warning')">
      <span class="dialog-icon">{{ icon }}</span>
    </div>

    <div class="dialog-body">
      <h3 class="dialog-title">{{ config().title }}</h3>
      <p class="dialog-message">{{ config().message }}</p>
    </div>

    <div class="dialog-actions">
      <button class="btn-cancel" (click)="onCancel()">
        {{ config().cancelText ?? 'Cancelar' }}
      </button>
      <button
        class="btn-confirm"
        [class]="'btn-confirm btn-confirm--' + (config().type ?? 'warning')"
        (click)="onConfirm()"
      >
        {{ config().confirmText ?? 'Confirmar' }}
      </button>
    </div>
  </div>
</div>
