<router-outlet />

@if (dialogService.dialogConfig()) {
  <app-confirm-dialog
    [config]="dialogService.dialogConfig()!"
    (confirmed)="dialogService.onConfirm()"
    (cancelled)="dialogService.onCancel()"
  />
}

@if (dialogService.toastConfig()) {
  <app-toast [config]="dialogService.toastConfig()!" />
}
